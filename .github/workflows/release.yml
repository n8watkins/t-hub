name: Release

# Runs the reusable quality gate, then builds + signs the Windows installer on a
# v* tag (or manual dispatch),
# generates the updater manifest (latest.json) from the signed NSIS artifact,
# and uploads everything to the GitHub Release. The in-app auto-updater fetches
# latest.json from this release's assets (see plugins.updater in
# apps/desktop/src-tauri/tauri.conf.json).
#
# Adapted from the sibling "scribe" app's release.yml to T-Hub's pnpm monorepo:
# all build steps run in `apps/desktop`, and dependencies are installed with pnpm
# at the workspace root.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      variant:
        description: "Build variant"
        type: choice
        options:
          - dev   # side-by-side "T-Hub Dev" (com.t-hub.dev, isolated t-hub-dev socket) — installs alongside production
          - prod  # the real "T-Hub" (com.t-hub.app) — replaces/upgrades the production install
        default: dev

permissions:
  contents: write

jobs:
  quality:
    name: Quality gate
    uses: ./.github/workflows/test.yml

  build-windows:
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm must be set up BEFORE setup-node's pnpm cache can resolve.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      # Install the whole pnpm workspace from the lockfile (the desktop app is the
      # only workspace member). Run at the repo root so the workspace resolves.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installers
        working-directory: apps/desktop
        shell: pwsh
        env:
          # Signs the NSIS updater artifact (createUpdaterArtifacts is on in
          # tauri.conf.json). These are repo secrets the orchestrator sets after
          # running `tauri signer generate`; the matching PUBLIC key is the
          # `plugins.updater.pubkey` in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # Tag pushes (no dispatch input) always build PROD. A manual dispatch
        # builds DEV by default: "T-Hub Dev" (com.t-hub.dev) with the
        # devbuild feature, installable ALONGSIDE production. See tauri.dev.conf.json.
        run: |
          if ("${{ github.event.inputs.variant }}" -eq "dev") {
            Write-Host "Building DEV variant: T-Hub Dev (com.t-hub.dev, isolated t-hub-dev socket)"
            pnpm tauri build -f devbuild --config src-tauri/tauri.dev.conf.json
          } else {
            Write-Host "Building PROD variant: T-Hub (com.t-hub.app)"
            pnpm tauri build
          }

      # The in-app updater fetches latest.json from the latest release; it points
      # at the signed NSIS installer of this release.
      - name: Generate updater manifest (latest.json)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $nsisDir = "apps/desktop/src-tauri/target/release/bundle/nsis"
          $setup = Get-ChildItem -Path $nsisDir -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $setup) { throw "No NSIS setup exe found" }
          $sigFile = "$($setup.FullName).sig"
          if (-not (Test-Path $sigFile)) { throw "No updater signature next to $($setup.Name); is TAURI_SIGNING_PRIVATE_KEY set?" }
          $tag = "${{ github.ref_name }}"
          $manifest = [ordered]@{
            version  = $tag.TrimStart("v")
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = (Get-Content $sigFile -Raw).Trim()
                url = "https://github.com/${{ github.repository }}/releases/download/$tag/$($setup.Name)"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content "$nsisDir/latest.json" -Encoding utf8
          Get-Content "$nsisDir/latest.json"

      - name: Attach installers to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            apps/desktop/src-tauri/target/release/bundle/nsis/latest.json
          generate_release_notes: true

      - name: Upload installers as workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: t-hub-${{ github.event.inputs.variant }}-installer
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
