name: Test

# The server-side TEST GATE (audit CRITICAL "no CI test gate"): runs on every
# pull_request to main, every push to main, and as the release workflow's reusable
# quality gate. It mirrors the exact suites the crews / no-mistakes run locally,
# so a red suite blocks merge and release instead of relying on a local test run.
#
# Runs on ubuntu-latest, NOT windows: every suite here is platform-agnostic
# (the Rust tests shell out to `tmux -L t-hub` on an isolated socket and the
# frontend suites are jsdom), they run green on Linux, and ubuntu runners are
# ~faster/cheaper. The Windows-only bits (the Tauri installer) stay in
# release.yml where they belong.

on:
  workflow_call:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Allow a manual run from the Actions tab for debugging the gate itself.
  workflow_dispatch:

# Cancel an in-flight run when a new commit is pushed to the same PR.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-msrv:
    name: Rust MSRV 1.89
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file
        working-directory: .

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.89.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri
          key: msrv-1.89

      - name: cargo check --workspace --locked
        run: cargo check --workspace --locked

  rust:
    name: Rust (cargo test + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Two categories of system deps:
      #  - tmux: the Rust tests (and mcp_e2e) shell out to the real `tmux` binary
      #    on the isolated `-L t-hub` socket.
      #  - the Tauri v2 Linux stack (glib/gtk/webkit2gtk/...): the desktop crate is
      #    a Tauri app, so it LINKS against these even to compile the test binary on
      #    Linux (glib-sys' build script fails without them). The app targets
      #    Windows/WSL, but building its tests on the fast ubuntu runner needs the
      #    Linux Tauri deps present. ubuntu-latest does NOT ship them.
      - name: Install system dependencies (tmux + Tauri Linux stack)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            tmux \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file
        working-directory: .

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # This committed gate builds the real MCP binary before workspace tests.
      - name: cargo workspace gate
        run: apps/desktop/scripts/workspace_gate.sh

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  frontend:
    name: Frontend (vitest + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm must be set up BEFORE setup-node's pnpm cache can resolve.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `tsc --noEmit` — the same command `pnpm typecheck` runs.
      - name: tsc --noEmit
        run: pnpm --filter t-hub-desktop typecheck

      # `vitest run` — the same command `pnpm --filter t-hub-desktop test` runs.
      - name: vitest run
        run: pnpm --filter t-hub-desktop test

      # Compile the actual production bundle as well as checking TypeScript.
      # This catches Vite import, asset, and bundling failures that jsdom does not.
      - name: Production frontend build
        run: pnpm build

      - name: Desktop version contract
        run: bash apps/desktop/scripts/check-version.sh --history

      - name: Packaged runtime benchmark contract
        run: bash scripts/perf/perf-benchmark.test.sh

      - name: GitHub Actions pinning contract
        run: bash scripts/ci/workflow-actions.test.sh
