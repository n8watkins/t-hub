<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-Hub</title>
  </head>
  <body class="bg-neutral-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Theming system: a self-contained module that mounts the ThemeProvider
         (live theme application + backend/MCP bridge + Ctrl/Cmd+, editor) into
         its own React root, so it needs no hook in App.tsx / main.tsx. -->
    <script type="module" src="/src/themeBootstrap.tsx"></script>
    <!-- MCP control bridge: a side-effect module that subscribes to the
         backend's `control://apply` event (emitted when an MCP Organization
         tool — focus_session / move_tile / rename_tab — is dispatched) and
         applies the mutation to the workspace store. No React render; runs its
         subscription on import, mirroring themeBootstrap above. -->
    <script type="module" src="/src/ipc/controlBridge.ts"></script>
  </body>
</html>
